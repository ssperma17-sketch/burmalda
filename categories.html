<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Категории — БУРМАЛДА=ЕДА</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="site">
<header class="topbar">
  <div class="container topbar-inner">
    <a class="logo" href="index.html">БУРМАЛДА=ЕДА</a>
    <nav class="nav">
      <a href="index.html">Главная</a>
      <a href="categories.html">Категории</a>
      <a href="cart.html">Корзина <span class="badge" id="cartBadge">0</span></a>
      <a href="login.html">Вход</a>
      <a href="register.html">Регистрация</a>
    </nav>
  </div>
</header>
<div class="toast" id="toast"></div>
<main class="main">
<div class="container page-block">
  <h1 class="section-title">Все категории</h1>
  <div class="category-grid" id="catGrid"></div>

  <h2 class="section-title" style="margin-top:36px" id="allProductsTitle">Все товары</h2>
  <div class="product-grid four-grid" id="productGrid"></div>
</div>
</main>
<footer class="footer">
  <div class="container footer-grid">
    <div><div class="footer-brand">БУРМАЛДА=ЕДА</div></div>
    <div><div class="footer-title">Покупателям</div><a href="categories.html">Каталог</a><a href="cart.html">Корзина</a></div>
    <div><div class="footer-title">Магазин</div><p>Доставка: 9:00–22:00</p><p>+7 (900) 000-00-00</p></div>
  </div>
  <div><center><p>© 2026 БУРМАЛДА=ЕДА</p></center></div>
</footer>
</div>
<script src="assets/js/data.js"></script>
<script src="assets/js/cart.js"></script>
<script>
  // Категории
  const catGrid = document.getElementById('catGrid');
  catGrid.innerHTML = CATEGORIES.map(c => {
    const count = PRODUCTS.filter(p => p.category_id === c.id && p.active).length;
    return `<a class="category-card" href="category.html?id=${c.id}">
      ${e(c.name)}
      <small>${count} товаров</small>
    </a>`;
  }).join('');

  // Все товары
  const grid = document.getElementById('productGrid');
  const params = new URLSearchParams(location.search);
  const filterCat = params.get('cat') ? parseInt(params.get('cat')) : null;
  let items = PRODUCTS.filter(p => p.active);
  if (filterCat) {
    items = items.filter(p => p.category_id === filterCat);
    const cat = CATEGORIES.find(c => c.id === filterCat);
    if (cat) document.getElementById('allProductsTitle').textContent = cat.name;
  }
  grid.innerHTML = items.map(p => productCard(p)).join('');
  updateCartBadge();
</script>
</body>
</html>
